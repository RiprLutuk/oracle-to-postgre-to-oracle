name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify editable CLI commands
        run: |
          oracle-pg-sync-audit --help
          ops report latest --config config.yaml.example

      - name: Compile
        run: python -m compileall -q oracle_pg_sync tests

      - name: Unit tests
        run: python -m unittest discover -s tests

      - name: Validate examples
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          for path in ["config.yaml.example", "configs/tables.example.yaml"]:
              data = yaml.safe_load(Path(path).read_text(encoding="utf-8"))
              assert data is not None, path
          PY

      - name: Parse config example
        run: |
          python - <<'PY'
          from oracle_pg_sync.config import load_config
          cfg = load_config("config.yaml.example")
          assert cfg.sync.dry_run is True
          assert cfg.reports.output_dir
          PY

      - name: Basic committed secret check
        run: |
          ! git ls-files | grep -E '(^|/)\.env$|(^|/)config\.yaml$|(^|/)configs/tables\.yaml$'
          ! git grep -n 'BEGIN .*PRIVATE KEY'
